version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ms-auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ms_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ms-auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-auth-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ms_auth
      JWT_SECRET: your-super-secret-key-change-in-production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: npm run start:dev

volumes:
  postgres_data:
